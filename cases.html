<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All F2L Cases — F2L Guide</title>
  <meta name="description" content="Browse all 41 F2L cases with animated 3D diagrams, algorithms, recognition hints, and progress tracking.">
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🟨</text></svg>">
  <script type="module" src="https://cdn.cubing.net/js/cubing/twisty"></script>
</head>
<body>

<header class="site-header" role="banner">
  <nav class="nav-inner" aria-label="Main navigation">
    <a href="index.html" class="nav-logo">F2L<span>Guide</span></a>
    <div class="nav-links" role="list">
      <a href="index.html" role="listitem">Home</a>
      <a href="cases.html" role="listitem">All Cases</a>
      <a href="about.html" role="listitem">About F2L</a>
    </div>
    <button class="nav-menu-btn" aria-label="Toggle menu" aria-expanded="false">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <rect y="3" width="20" height="2" rx="1"/>
        <rect y="9" width="20" height="2" rx="1"/>
        <rect y="15" width="20" height="2" rx="1"/>
      </svg>
    </button>
  </nav>
</header>

<main>
  <div class="page-wide">

    <div style="margin-bottom: var(--space-6);">
      <h1 style="font-size: var(--text-2xl); letter-spacing: -0.03em; margin-bottom: var(--space-2);">All F2L Cases</h1>
      <p style="color: var(--text-muted); font-size: var(--text-sm);">
        All algorithms target the <strong style="color:var(--text-primary)">front-right (FR) slot</strong>.
        White cross on bottom, yellow on top.
      </p>
    </div>

    <!-- Progress bar -->
    <div class="progress-bar-wrap" aria-label="Learning progress">
      <div class="progress-bar-track" role="progressbar" aria-valuemin="0" aria-valuemax="41" aria-valuenow="0">
        <div class="progress-bar-fill" style="width: 0%"></div>
      </div>
      <span class="progress-label"><strong>0</strong> / 41 learned</span>
      <button
        onclick="if(confirm('Reset all progress?')){localStorage.removeItem('f2l-learned');location.reload();}"
        style="font-size:var(--text-xs);color:var(--text-subtle);padding:0;background:none;border:none;cursor:pointer;white-space:nowrap;"
        aria-label="Reset all progress">
        Reset
      </button>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar" role="group" aria-label="Filter by category"></div>

    <!-- Case count -->
    <div class="cases-meta">
      <p class="cases-count">Showing <strong>41</strong> of 41 cases</p>
    </div>

    <!-- Case grid -->
    <div class="cases-grid" role="list" aria-live="polite" aria-label="F2L cases"></div>

  </div>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <span>F2L Guide — CFOP Reference</span>
    <span>Algorithms sourced from the SpeedSolving wiki</span>
  </div>
</footer>

<script src="js/nav.js"></script>
<script type="module" src="js/cases.js"></script>
</body>
</html>
